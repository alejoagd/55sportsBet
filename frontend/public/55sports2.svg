<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Strong glow background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A1A2F"></stop>
      <stop offset="100%" stop-color="#02060D"></stop>
    </radialGradient>

    <!-- Neon ring -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"></stop>
      <stop offset="100%" stop-color="#FF6A00"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"></rect>

  <!-- Bold neon ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#ring)" stroke-width="5"></circle>

  <!-- Clean ball center (no cross lines) -->
  <circle cx="32" cy="32" r="10" fill="#08121F"></circle>

  <!-- Subtle highlight for depth -->
  <circle cx="29" cy="29" r="4" fill="#FFFFFF" opacity="0.08"></circle>

  <!-- BIG brand mark -->
  <text x="32" y="37" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    55
  </text>
</svg>